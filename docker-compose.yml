services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: indexer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indexer"]
      interval: 5s
      timeout: 5s
      retries: 20

  setup:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/indexer
      RPC_URL: ${RPC_URL:?Set RPC_URL in your shell or .env before running docker compose}
      WS_URL: ${WS_URL:?Set WS_URL in your shell or .env before running docker compose}
      IDL_PATH: ${IDL_PATH:-/app/idl.json}
    command: ["sh", "-c", "pnpm start:setup \"$$IDL_PATH\""]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/indexer
      RPC_URL: ${RPC_URL:?Set RPC_URL in your shell or .env before running docker compose}
      WS_URL: ${WS_URL:?Set WS_URL in your shell or .env before running docker compose}
      PORT: ${PORT:-3000}
    command: ["pnpm", "start:api"]
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

  indexer:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/indexer
      RPC_URL: ${RPC_URL:?Set RPC_URL in your shell or .env before running docker compose}
      WS_URL: ${WS_URL:?Set WS_URL in your shell or .env before running docker compose}
    command: ["pnpm", "start:indexer", "--mode", "${INDEXER_MODE:-realtime}"]
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully

volumes:
  postgres-data:
