services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: indexer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indexer"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-3000}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/indexer
      INDEXER_ENABLED: ${INDEXER_ENABLED:-true}
      INDEXER_MODE: ${INDEXER_MODE:-realtime}
      PROGRAM_IDL_PATH: ${PROGRAM_IDL_PATH:-/app/idl.json}
      RPC_URL: ${RPC_URL:?Set RPC_URL in your shell or .env before running docker compose}
      WS_URL: ${WS_URL:?Set WS_URL in your shell or .env before running docker compose}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"

volumes:
  postgres-data:
